name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # HPS app — canonical build: Debian Bullseye's cross gcc targets glibc 2.31,
  # exactly matching the MiSTer Linux image.
  app:
    runs-on: ubuntu-latest
    container: debian:bullseye
    steps:
      - name: Install toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            gcc-arm-linux-gnueabihf libc6-dev-armhf-cross make file ca-certificates
      - uses: actions/checkout@v4
      - name: Build
        run: make -C app
      - uses: actions/upload-artifact@v4
        with:
          name: hps-app
          path: app/build/

  # FPGA core (.rbf) — Quartus 17.0 (the version mandated by Template_MiSTer)
  # via the raetro/quartus Docker image built for MiSTer CI.  Internal Quartus
  # revision is "MP240" (revision names can't start with a digit); the shipped
  # core file is renamed to 240MP.rbf.
  # NOTE: not `container:` — the Quartus image's glibc is too old to host
  # GitHub's Node-based actions (checkout fails inside it).  Instead the job
  # runs on the host and only the compile itself happens in docker.
  rbf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile core (Quartus 17.0 in docker)
        run: |
          docker run --rm -v "$PWD/fpga:/build" raetro/quartus:17.0 \
            quartus_sh --flow compile MP240.qpf
      - name: Rename rbf
        run: cp fpga/output_files/MP240.rbf 240MP.rbf
      - uses: actions/upload-artifact@v4
        with:
          name: core-rbf
          path: 240MP.rbf
